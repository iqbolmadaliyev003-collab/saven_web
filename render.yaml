# Render Blueprint — frontend (static site).
# Qo'lda "Static Site" yaratayotgan bo'lsangiz:
#   Build Command:     npm ci && npm run build
#   Publish Directory: dist
#   Environment:       VITE_API_URL = https://<backend-nomi>.onrender.com/api/v1/
# va "Redirects/Rewrites" bo'limida SPA uchun:  /*  ->  /index.html  (Rewrite)

services:
  - type: web
    name: saven-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Backend'ning to'liq manzili, masalan:
      # https://saven-backend.onrender.com/api/v1/
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
